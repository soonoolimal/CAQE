# logging
wandb_project: "CAQE-Train"

# training
batch_size: 256
n_epochs: 50
num_workers: 4  # number of DataLoader worker processes for loading hidden vector chunks

# optimizer
learning_rate: 3.0e-4
weight_decay: 0.0

# scheduler and early stopping
scheduler: "cosine"            # cosine / plateau / none
plateau_patience: 3            # patience for ReduceLROnPlateau (used only when scheduler is "plateau")
plateau_mode: "min"            # optimization direction for ReduceLROnPlateau
early_stopping: true           # automatically disabled when scheduler is cosine
early_stopping_patience: 5     # epochs without improvement before stopping
early_stopping_min_delta: 0.0  # minimum val_loss improvement to reset patience

# validation
val_ratio: 0.1

# checkpoint
checkpoint_dir: "checkpoints"  # directory to save best model checkpoints

# codebook
warm_start_batches: 50  # batches of Encoder(h) outputs collected for K-Means warm start
dead_code_reinit: true  # reinitialize dead codebook entries after each epoch
